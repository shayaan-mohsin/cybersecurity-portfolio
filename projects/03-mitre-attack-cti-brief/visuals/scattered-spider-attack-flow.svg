<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="540" viewBox="0 0 1080 540" role="img" aria-labelledby="title desc">
  <title id="title">Scattered Spider attack flow</title>
  <desc id="desc">Public-source Scattered Spider tradecraft summarized as an identity-centered attack flow.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <style>
      .label { font-family: Arial, Helvetica, sans-serif; fill: #0f172a; }
      .muted { fill: #475569; }
      .box { fill: #ffffff; stroke: #dbe3ef; stroke-width: 1.4; }
      .stage { font-size: 13px; font-weight: 700; letter-spacing: .2px; }
      .title { font-size: 24px; font-weight: 800; }
      .body { font-size: 13px; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <rect x="20" y="20" width="1040" height="500" rx="18" fill="#f8fafc" stroke="#dbe3ef"/>
  <text class="label title" x="52" y="66">Scattered Spider Identity-Centered Attack Flow</text>
  <text class="label muted body" x="52" y="94">A public-source CTI summary of how social engineering can become identity compromise, data theft, and business impact.</text>

  <rect class="box" x="52" y="140" width="220" height="112" rx="14"/>
  <rect x="52" y="140" width="220" height="8" rx="4" fill="#2563eb"/>
  <text class="label stage" x="76" y="176">1. Recon</text>
  <text class="label body" x="76" y="202">Collect employee names,</text>
  <text class="label body" x="76" y="222">roles, processes, and</text>
  <text class="label body" x="76" y="242">support details.</text>

  <rect class="box" x="300" y="140" width="220" height="112" rx="14"/>
  <rect x="300" y="140" width="220" height="8" rx="4" fill="#0891b2"/>
  <text class="label stage" x="324" y="176">2. Social Engineering</text>
  <text class="label body" x="324" y="202">Use vishing, phishing,</text>
  <text class="label body" x="324" y="222">SIM swap, and help desk</text>
  <text class="label body" x="324" y="242">reset pressure.</text>

  <rect class="box" x="548" y="140" width="220" height="112" rx="14"/>
  <rect x="548" y="140" width="220" height="8" rx="4" fill="#16a34a"/>
  <text class="label stage" x="572" y="176">3. Valid Accounts</text>
  <text class="label body" x="572" y="202">Gain access through</text>
  <text class="label body" x="572" y="222">reset credentials or</text>
  <text class="label body" x="572" y="242">stolen sessions.</text>

  <rect class="box" x="796" y="140" width="220" height="112" rx="14"/>
  <rect x="796" y="140" width="220" height="8" rx="4" fill="#ca8a04"/>
  <text class="label stage" x="820" y="176">4. MFA Abuse</text>
  <text class="label body" x="820" y="202">Register attacker MFA,</text>
  <text class="label body" x="820" y="222">push fatigue prompts,</text>
  <text class="label body" x="820" y="242">or alter auth methods.</text>

  <rect class="box" x="176" y="332" width="220" height="112" rx="14"/>
  <rect x="176" y="332" width="220" height="8" rx="4" fill="#7c3aed"/>
  <text class="label stage" x="200" y="368">5. RMM Persistence</text>
  <text class="label body" x="200" y="394">Use legitimate remote</text>
  <text class="label body" x="200" y="414">access tools to blend</text>
  <text class="label body" x="200" y="434">into operations.</text>

  <rect class="box" x="424" y="332" width="220" height="112" rx="14"/>
  <rect x="424" y="332" width="220" height="8" rx="4" fill="#dc2626"/>
  <text class="label stage" x="448" y="368">6. SaaS Collection</text>
  <text class="label body" x="448" y="394">Search email, cloud</text>
  <text class="label body" x="448" y="414">storage, code repos,</text>
  <text class="label body" x="448" y="434">and team messages.</text>

  <rect class="box" x="672" y="332" width="220" height="112" rx="14"/>
  <rect x="672" y="332" width="220" height="8" rx="4" fill="#0f766e"/>
  <text class="label stage" x="696" y="368">7. Impact</text>
  <text class="label body" x="696" y="394">Exfiltrate data, apply</text>
  <text class="label body" x="696" y="414">extortion pressure, and</text>
  <text class="label body" x="696" y="434">potentially deploy ransomware.</text>

  <path d="M272 196 H292" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M520 196 H540" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M768 196 H788" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M906 252 C906 292 286 292 286 324" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M396 388 H416" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M644 388 H664" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <text class="label muted body" x="52" y="488">Defensive emphasis: identity proofing, MFA governance, SaaS logging, RMM inventory, data-theft response, and recovery readiness.</text>
</svg>
