<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="620" viewBox="0 0 1080 620" role="img" aria-labelledby="title desc">
  <title id="title">Identity-focused defender workflow</title>
  <desc id="desc">A defensive workflow for identity-centered Scattered Spider tradecraft.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <style>
      .label { font-family: Arial, Helvetica, sans-serif; fill: #0f172a; }
      .muted { fill: #475569; }
      .box { fill: #ffffff; stroke: #dbe3ef; stroke-width: 1.4; }
      .stage { font-size: 13px; font-weight: 700; letter-spacing: .2px; }
      .title { font-size: 24px; font-weight: 800; }
      .body { font-size: 13px; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <rect x="20" y="20" width="1040" height="580" rx="18" fill="#f8fafc" stroke="#dbe3ef"/>
  <text class="label title" x="52" y="66">Defender Workflow For Identity-Centered Intrusions</text>
  <text class="label muted body" x="52" y="94">A practical response path that turns CTI into backlog items, logging priorities, and leadership-ready risk reduction.</text>

  <rect class="box" x="72" y="138" width="280" height="110" rx="14"/>
  <rect x="72" y="138" width="280" height="8" rx="4" fill="#2563eb"/>
  <text class="label stage" x="100" y="174">1. Harden Help Desk Identity Proofing</text>
  <text class="label body" x="100" y="202">Add callback rules, supervisor approval,</text>
  <text class="label body" x="100" y="222">and evidence requirements for high-risk resets.</text>

  <rect class="box" x="400" y="138" width="280" height="110" rx="14"/>
  <rect x="400" y="138" width="280" height="8" rx="4" fill="#0891b2"/>
  <text class="label stage" x="428" y="174">2. Govern MFA Changes</text>
  <text class="label body" x="428" y="202">Alert on new MFA methods, repeated prompts,</text>
  <text class="label body" x="428" y="222">and unusual post-reset sign-ins.</text>

  <rect class="box" x="728" y="138" width="280" height="110" rx="14"/>
  <rect x="728" y="138" width="280" height="8" rx="4" fill="#16a34a"/>
  <text class="label stage" x="756" y="174">3. Monitor IdP And SaaS Logs</text>
  <text class="label body" x="756" y="202">Prioritize cloud account discovery, mailbox</text>
  <text class="label body" x="756" y="222">search, repository cloning, and bulk downloads.</text>

  <rect class="box" x="72" y="348" width="280" height="110" rx="14"/>
  <rect x="72" y="348" width="280" height="8" rx="4" fill="#ca8a04"/>
  <text class="label stage" x="100" y="384">4. Control Remote Access Tools</text>
  <text class="label body" x="100" y="412">Maintain approved RMM inventory and block</text>
  <text class="label body" x="100" y="432">unexpected remote-control software.</text>

  <rect class="box" x="400" y="348" width="280" height="110" rx="14"/>
  <rect x="400" y="348" width="280" height="8" rx="4" fill="#dc2626"/>
  <text class="label stage" x="428" y="384">5. Prepare Data-Theft Response</text>
  <text class="label body" x="428" y="412">Coordinate legal, privacy, communications,</text>
  <text class="label body" x="428" y="432">and business leadership before an incident.</text>

  <rect class="box" x="728" y="348" width="280" height="110" rx="14"/>
  <rect x="728" y="348" width="280" height="8" rx="4" fill="#7c3aed"/>
  <text class="label stage" x="756" y="384">6. Test Recovery Readiness</text>
  <text class="label body" x="756" y="412">Validate backups, privileged access recovery,</text>
  <text class="label body" x="756" y="432">and executive decision-making paths.</text>

  <path d="M352 193 H392" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M680 193 H720" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M868 248 C868 296 212 296 212 340" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M352 403 H392" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M680 403 H720" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="72" y="506" width="936" height="54" rx="12" fill="#eff6ff" stroke="#bfdbfe"/>
  <text class="label body" x="100" y="538">Program outcome: fewer high-risk identity reset paths, stronger detection coverage, clearer escalation ownership, and faster response to SaaS-focused data theft.</text>
</svg>
