<rect x="712" y="132" width="292" height="96" rx="14" fill="#ffffff" stroke="#dbe3ef"/>
<text fill="#334155" font-size="13" font-weight="700"><tspan x="734" dy="0">Hacking/IT incidents</tspan></text>
